services:
  - type: web
    name: pjh_backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://pjh-frontend.onrender.com,https://pjh.onrender.com

  - type: web
    name: pjh-frontend
    runtime: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run preview"
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pjh_backend.onrender.com/api/v1
    routes:
      - path: /
        destination: /
